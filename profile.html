<!DOCTYPE html>
<html>
<head>
  <title>Profile - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:20px;
    }

    .back-btn{
      margin-bottom:10px;
      background:none;
      border:none;
      color:#ff4fa3;
      font-size:14px;
      cursor:pointer;
      padding:0;
      appearance:none;
      -webkit-appearance:none;
      outline:none;
      box-shadow:none;
    }

    .back-btn:focus,
    .back-btn:active{
      outline:none;
      box-shadow:none;
      background:none;
    }

    .avatar{
      width:70px;
      height:70px;
      border-radius:50%;
      background:#2a2a2a;
      margin:0 auto 15px;
      background-size:cover;
      background-position:center;
    }

    .title{
      text-align:center;
      font-size:20px;
      margin-bottom:20px;
    }

    .row{
      margin-bottom:12px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .name-wrap{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
    }

    .primary{
      background:#ff4fa3;
      color:#fff;
    }

    .dark{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #3a3a3a;
    }

    .chat-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #2a2a2a;
      cursor:pointer;
    }

    .chat-avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#2a2a2a;
      background-size:cover;
      background-position:center;
      flex-shrink:0;
    }

    .chat-name{
      font-size:14px;
      font-weight:700;
    }

    .chat-date{
      font-size:11px;
      opacity:0.6;
      margin-top:2px;
    }

    .empty{
      opacity:0.6;
      font-size:13px;
      padding:8px 0;
    }

    .edit-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      outline:none;
      box-shadow:none;
      cursor:pointer;
      font-size:14px;
      color:#ff4fa3;
      padding:0;
      margin:0;
      line-height:1;
      appearance:none;
      -webkit-appearance:none;
      border-radius:0;
    }

    .edit-btn:hover,
    .edit-btn:focus,
    .edit-btn:active,
    .edit-btn:focus-visible{
      background:transparent;
      outline:none;
      box-shadow:none;
      border:none;
    }
  </style>
</head>
<body>

<div class="card">

  <button class="back-btn" onclick="window.location.href='result.html'">← Back</button>

  <div class="avatar" id="avatar"></div>

  <div class="title">Your Profile</div>

  <div class="row">
    <span>Name:</span>
    <div class="name-wrap">
      <strong id="name">-</strong>
      <button type="button" class="edit-btn" onclick="editName()">✏️</button>
    </div>
  </div>

  <div class="row">
    <span>Email:</span>
    <strong id="email">-</strong>
  </div>

  <div class="row">
    <span>Tokens:</span>
    <strong id="tokens">0</strong>
  </div>

  <h3 style="margin-top:20px;">Recent Chats</h3>
  <div id="recentChats"></div>

  <button class="btn dark" onclick="goGift()">🎁 Gifts</button>
  <button class="btn dark" onclick="goSubscribe()">💎 Subscribe</button>
  <button class="btn dark" onclick="goAlbum()">🖼 Album</button>
  <button class="btn primary" onclick="logout()">Logout</button>

</div>

<script>
function getAccessToken(){
  return localStorage.getItem('accessToken') || '';
}

function authHeaders(extra = {}){
  const token = getAccessToken();
  return token ? { ...extra, Authorization: 'Bearer ' + token } : extra;
}

function clearUserState(){
  [
    'userId',
    'userEmail',
    'userName',
    'accessToken',
    'refreshToken',
    'aiImage',
    'imageUnlocked',
    'lastProfileKey',
    'aiName'
  ].forEach(key => localStorage.removeItem(key));
}

if(!getAccessToken()){
  window.location.href = 'login.html';
}

const nameEl = document.getElementById('name');
const emailEl = document.getElementById('email');
const tokenEl = document.getElementById('tokens');
const avatarEl = document.getElementById('avatar');

nameEl.innerText = localStorage.getItem('userName') || 'User';
emailEl.innerText = localStorage.getItem('userEmail') || '-';

const savedImage = localStorage.getItem('aiImage');
if(savedImage){
  avatarEl.style.backgroundImage = `url(${savedImage})`;
}

async function loadTokens(){
  try{
    const res = await fetch('/api/wallet', {
      headers: authHeaders()
    });
    const data = await res.json();

    if(data.error){
      tokenEl.innerText = 0;
      return;
    }

    tokenEl.innerText = data.balance || 0;

    if(data.userId){
      localStorage.setItem('userId', data.userId);
    }
  }catch(e){
    tokenEl.innerText = 0;
  }
}

async function editName(){
  const current = localStorage.getItem('userName') || '';
  const newName = prompt('Enter your name', current);

  if(!newName || !newName.trim()) return;

  try{
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: authHeaders({
        'Content-Type': 'application/json'
      }),
      body: JSON.stringify({
        type: 'update-name',
        name: newName.trim()
      })
    });

    const data = await res.json();

    if(data.error){
      alert(data.error);
      return;
    }

    localStorage.setItem('userName', newName.trim());
    nameEl.innerText = newName.trim();

  }catch(e){
    alert('Error updating name');
  }
}

function loadRecentChats(){
  const container = document.getElementById('recentChats');
  container.innerHTML = '';

  const chats = JSON.parse(localStorage.getItem('recentChats') || '[]')
    .slice(-5)
    .reverse();

  if(!chats.length){
    container.innerHTML = '<div class="empty">No recent chats</div>';
    return;
  }

  chats.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'chat-item';

    div.innerHTML = `
      <div class="chat-avatar" style="background-image:url('${chat.image || ''}')"></div>
      <div>
        <div class="chat-name">${chat.name || 'AI'}</div>
        <div class="chat-date">${chat.date || ''}</div>
      </div>
    `;

    div.onclick = () => {
      localStorage.setItem('aiName', chat.name || 'AI');
      window.location.href = 'chat.html';
    };

    container.appendChild(div);
  });
}

function logout(){
  clearUserState();
  window.location.href = 'login.html';
}

function goGift(){
  window.location.href = 'gift.html';
}

function goSubscribe(){
  window.location.href = 'subscribe.html';
}

function goAlbum(){
  window.location.href = 'album.html';
}

loadTokens();
loadRecentChats();
</script>

</body>
</html>
