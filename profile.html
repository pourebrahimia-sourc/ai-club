<!DOCTYPE html>
<html>
<head>
  <title>Profile - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    :root{
      --bg:#111;
      --card:#181818;
      --card-2:#141414;
      --line:#2a2a2a;
      --line-2:#242424;
      --text:#fff;
      --muted:rgba(255,255,255,0.64);
      --pink:#ff4fa3;
      --pink-soft:rgba(255,79,163,0.12);
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,79,163,0.10), transparent 26%),
        var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      padding:14px;
    }

    .page{
      width:100%;
      max-width:420px;
      margin:0 auto;
      animation:fadeUp 0.28s ease;
    }

    .card{
      width:100%;
      background:linear-gradient(180deg, #1b1b1b 0%, #171717 100%);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      box-shadow:0 16px 44px rgba(0,0,0,0.34);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .back-btn{
      width:36px;
      height:36px;
      border:none;
      border-radius:11px;
      background:#222;
      color:var(--pink);
      font-size:16px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .topbar-title{
      font-size:14px;
      font-weight:700;
      letter-spacing:0.2px;
      opacity:0.95;
    }

    .hero{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      padding:12px;
      border-radius:16px;
      background:linear-gradient(180deg, #151515 0%, #131313 100%);
      border:1px solid var(--line-2);
    }

    .avatar{
      width:58px;
      height:58px;
      border-radius:50%;
      background:#2a2a2a;
      background-size:cover;
      background-position:center;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    .hero-text{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:18px;
      font-weight:700;
      margin:0 0 3px 0;
      line-height:1.2;
    }

    .subtitle{
      margin:0;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .stats{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }

    .row{
      min-height:44px;
      font-size:13px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:0 12px;
      border-radius:14px;
      background:var(--card-2);
      border:1px solid var(--line-2);
    }

    .row-label{
      color:rgba(255,255,255,0.72);
      flex-shrink:0;
    }

    .name-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .value{
      font-weight:700;
      text-align:right;
      word-break:break-word;
      font-size:13px;
    }

    .edit-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      outline:none;
      cursor:pointer;
      font-size:13px;
      color:var(--pink);
      padding:0;
      margin:0;
      line-height:1;
    }

    .section{
      margin-top:10px;
      padding:12px;
      border-radius:16px;
      background:linear-gradient(180deg, #151515 0%, #131313 100%);
      border:1px solid var(--line-2);
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .section-title h3{
      margin:0;
      font-size:14px;
    }

    .section-sub{
      font-size:11px;
      color:rgba(255,255,255,0.56);
    }

    .recent-chats{
      min-height:188px;
      opacity:0;
      transition:opacity 0.35s ease;
    }

    .chat-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #252525;
    }

    .chat-item:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .chat-avatar{
      width:42px;
      height:42px;
      border-radius:50%;
      background:#2a2a2a;
      background-size:cover;
      background-position:center;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,0.08);
    }

    .chat-meta{
      flex:1;
      min-width:0;
    }

    .chat-name{
      font-size:13px;
      font-weight:700;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-date{
      font-size:10px;
      opacity:0.6;
    }

    .chat-btn{
      background:var(--pink);
      border:none;
      color:#fff;
      border-radius:11px;
      padding:8px 12px;
      font-size:11px;
      cursor:pointer;
      font-weight:700;
      min-width:62px;
      box-shadow:0 8px 20px rgba(255,79,163,0.18);
    }

    .empty{
      opacity:0.6;
      font-size:12px;
      padding:8px 0;
    }

    .actions{
      margin-top:10px;
      display:grid;
      gap:8px;
    }

    .btn{
      width:100%;
      min-height:44px;
      padding:10px;
      border:none;
      border-radius:13px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      transition:transform 0.14s ease, opacity 0.2s ease;
    }

    .btn:active{
      transform:scale(0.985);
    }

    .primary{
      background:var(--pink);
      color:#fff;
      box-shadow:0 10px 26px rgba(255,79,163,0.16);
    }

    .dark{
      background:#242424;
      color:#fff;
      border:1px solid #343434;
    }

    .loading-blur{
      filter:blur(6px);
      opacity:0.55;
      transition:all 0.35s ease;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(0,0,0,0.6);
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-box{
      width:100%;
      max-width:340px;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:18px;
      box-shadow:0 20px 60px rgba(0,0,0,0.45);
    }

    .modal-title{
      font-size:17px;
      font-weight:700;
      margin-bottom:12px;
    }

    .modal-input{
      width:100%;
      height:46px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#111;
      border:1px solid #2b2b2b;
      color:#fff;
      padding:0 14px;
      font-size:14px;
      margin-bottom:12px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
    }

    .modal-btn{
      flex:1;
      height:42px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
    }

    .modal-cancel{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #3a3a3a;
    }

    .modal-save{
      background:var(--pink);
      color:#fff;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width:380px){
      body{ padding:12px; }
      .card{ padding:12px; }
      .hero{ padding:10px; gap:10px; }
      .avatar{ width:54px; height:54px; }
      .title{ font-size:17px; }
      .recent-chats{ min-height:176px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="topbar">
      <button class="back-btn" onclick="closePage()">✕</button>
      <div class="topbar-title">AI Club</div>
      <div style="width:36px;"></div>
    </div>

    <div class="hero">
      <div class="avatar" id="avatar"></div>
      <div class="hero-text">
        <div class="title">Your Profile</div>
        <p class="subtitle">Manage your account, tokens, and recent characters.</p>
      </div>
    </div>

    <div class="stats">
      <div class="row">
        <span class="row-label">Name</span>
        <div class="name-wrap">
          <strong id="name" class="value">-</strong>
          <button type="button" class="edit-btn" onclick="openNameModal()">✏️</button>
        </div>
      </div>

      <div class="row">
        <span class="row-label">Email</span>
        <strong id="email" class="value">-</strong>
      </div>

      <div class="row">
        <span class="row-label">Tokens</span>
        <strong id="tokens" class="value">0</strong>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        <h3>Recent Chats</h3>
        <span class="section-sub">Your latest characters</span>
      </div>

      <div id="recentChats" class="recent-chats">
        <div class="empty">Loading chats...</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn dark" onclick="goGift()">🎁 Gifts</button>
      <button class="btn dark" onclick="goSubscribe()">💎 Subscribe</button>
      <button class="btn dark" onclick="goAlbum()">🖼 Album</button>
      <button class="btn primary" onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<div id="nameModal" class="modal">
  <div class="modal-box">
    <div class="modal-title">Edit your name</div>
    <input id="nameInput" class="modal-input" type="text" placeholder="Enter your name" />
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeNameModal()">Cancel</button>
      <button class="modal-btn modal-save" onclick="saveName()">Save</button>
    </div>
  </div>
</div>

<div id="tokenModal" style="
display:none;
position:fixed;
inset:0;
z-index:120;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
    width:100%;
    max-width:320px;
    background:#1a1a1a;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:18px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  ">
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">
      Not enough tokens
    </div>

    <div id="tokenModalText" style="font-size:13px;opacity:0.82;line-height:1.5;margin-bottom:16px;">
      You need 5 tokens.
    </div>

    <button id="getTokensBtn" class="btn primary" style="margin-bottom:10px;">
      Get Tokens
    </button>

    <button id="subscribeBtn" class="btn dark">
      Subscribe
    </button>

    <div id="closeTokenModal" style="
      margin-top:14px;
      font-size:12px;
      opacity:0.7;
      cursor:pointer;
    ">
      Close
    </div>
  </div>
</div>

<script>
function closePage(){
  const from = localStorage.getItem('funnelFrom');
  if (from === 'result') {
    window.location.href = 'result.html';
  } else {
    window.location.href = 'index.html';
  }
}

function getAccessToken(){
  return localStorage.getItem('accessToken') || '';
}

function authHeaders(extra = {}){
  const token = getAccessToken();
  return token ? { ...extra, Authorization: 'Bearer ' + token } : extra;
}

function clearUserState(){
  [
    'userId',
    'userEmail',
    'userName',
    'accessToken',
    'refreshToken',
    'age',
    'ethnicity',
    'body',
    'bodyDetails',
    'hair',
    'appearanceDetails',
    'personality',
    'aiImage',
    'imageUnlocked',
    'lastProfileKey',
    'aiName',
    'selectedCharacterId',
    'recentChats',
    'loginReturnTo',
    'funnelFrom'
  ].forEach(key => localStorage.removeItem(key));
}

if(!getAccessToken()){
  window.location.href = 'login.html';
}

const nameEl = document.getElementById('name');
const emailEl = document.getElementById('email');
const tokenEl = document.getElementById('tokens');
const avatarEl = document.getElementById('avatar');
const nameModal = document.getElementById('nameModal');
const nameInput = document.getElementById('nameInput');
const recentChatsEl = document.getElementById('recentChats');

const tokenModal = document.getElementById('tokenModal');
const tokenModalText = document.getElementById('tokenModalText');
const closeTokenModal = document.getElementById('closeTokenModal');
const getTokensBtn = document.getElementById('getTokensBtn');
const subscribeBtn = document.getElementById('subscribeBtn');

nameEl.classList.add('loading-blur');
tokenEl.classList.add('loading-blur');

emailEl.innerText = localStorage.getItem('userEmail') || '-';
avatarEl.style.backgroundImage = 'none';

function openTokenModalWithAmount(amount) {
  tokenModalText.innerText = `You need ${amount} tokens.`;
  tokenModal.style.display = 'flex';
}

function closeModal() {
  tokenModal.style.display = 'none';
}

async function getUserBalance() {
  try {
    const res = await fetch('/api/wallet', {
      headers: authHeaders()
    });
    const data = await res.json();
    return Number(data.balance || 0);
  } catch (e) {
    return 0;
  }
}

async function openChatForCharacter(c){
  const balance = await getUserBalance();

  if (balance < 5) {
    openTokenModalWithAmount(5);
    return;
  }

  localStorage.setItem('aiName', c.name || 'AI');
  localStorage.setItem('selectedCharacterId', c.id);
  localStorage.setItem('aiImage', c.image_url || '');
  localStorage.setItem('imageUnlocked', c.image_url ? 'true' : 'false');
  window.location.href = 'chat.html';
}

async function loadUserProfile(){
  try {
    const res = await fetch('/api/session', {
      headers: authHeaders()
    });

    const data = await res.json();
    const session = data?.data?.session;

    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const latestName = session.profileName || 'User';
    const latestEmail = session.user?.email || '-';
    const latestBalance = session.balance ?? null;

    localStorage.setItem('userName', latestName);
    localStorage.setItem('userEmail', latestEmail);

    if(session.user?.id){
      localStorage.setItem('userId', session.user.id);
    }

    nameEl.innerText = latestName;
    emailEl.innerText = latestEmail;

    if (latestBalance !== null) {
      tokenEl.innerText = latestBalance;
    } else {
      await loadTokensFallback();
    }

    nameEl.classList.remove('loading-blur');
    tokenEl.classList.remove('loading-blur');

  } catch(e){
    await loadTokensFallback();
    nameEl.classList.remove('loading-blur');
    tokenEl.classList.remove('loading-blur');
  }
}

async function loadTokensFallback(){
  try{
    const res = await fetch('/api/wallet', {
      headers: authHeaders()
    });

    const data = await res.json();
    tokenEl.innerText = data.balance || 0;

    if(data.userId){
      localStorage.setItem('userId', data.userId);
    }
  }catch(e){
    tokenEl.innerText = 0;
  }
}

function openNameModal(){
  nameInput.value = localStorage.getItem('userName') || '';
  nameModal.style.display = 'flex';
  setTimeout(() => nameInput.focus(), 50);
}

function closeNameModal(){
  nameModal.style.display = 'none';
}

async function saveName(){
  const newName = nameInput.value.trim();
  if(!newName) return;

  try{
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: authHeaders({
        'Content-Type': 'application/json'
      }),
      body: JSON.stringify({
        type: 'update-name',
        name: newName
      })
    });

    const data = await res.json();

    if(data.error){
      alert(data.error);
      return;
    }

    closeNameModal();
    await loadUserProfile();

  }catch(e){
    alert('Error updating name');
  }
}

async function loadCharacters(){
  recentChatsEl.style.opacity = '0';
  recentChatsEl.innerHTML = '';

  try{
    const res = await fetch('/api/characters', {
      headers: authHeaders()
    });

    const data = await res.json();
    const chars = data.characters || [];

    if(!chars.length){
      recentChatsEl.innerHTML = '<div class="empty">No characters yet</div>';
      recentChatsEl.style.opacity = '1';
      return;
    }

    chars.forEach(c => {
      const div = document.createElement('div');
      div.className = 'chat-item';

      div.innerHTML = `
        <div class="chat-avatar" style="background-image:url('${c.image_url || ''}')"></div>

        <div class="chat-meta">
          <div class="chat-name">${c.name || 'AI'}</div>
          <div class="chat-date">${new Date(c.created_at).toLocaleDateString()}</div>
        </div>

        <button class="chat-btn">Chat</button>
      `;

      const btn = div.querySelector('.chat-btn');

      btn.onclick = () => {
        openChatForCharacter(c);
      };

      recentChatsEl.appendChild(div);
    });

    recentChatsEl.style.opacity = '1';
  }catch(e){
    recentChatsEl.innerHTML = '<div class="empty">Error loading</div>';
    recentChatsEl.style.opacity = '1';
  }
}

function logout(){
  clearUserState();
  window.location.href = 'index.html';
}

function goGift(){ window.location.href = 'gift.html'; }
function goSubscribe(){ window.location.href = 'subscribe.html'; }
function goAlbum(){ window.location.href = 'album.html'; }

nameModal.addEventListener('click', (e) => {
  if(e.target === nameModal) closeNameModal();
});

nameInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') saveName();
});

closeTokenModal.addEventListener('click', closeModal);

tokenModal.addEventListener('click', (e) => {
  if (e.target === tokenModal) closeModal();
});

getTokensBtn.addEventListener('click', () => {
  closeModal();
  window.location.href = 'gift.html';
});

subscribeBtn.addEventListener('click', () => {
  closeModal();
  window.location.href = 'subscribe.html';
});

loadUserProfile();
loadCharacters();
</script>

</body>
</html>
