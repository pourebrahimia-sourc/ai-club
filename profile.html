<!DOCTYPE html>
<html>
<head>
  <title>Profile - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:380px;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:20px;
    }

    .avatar{
      width:70px;
      height:70px;
      border-radius:50%;
      background:#2a2a2a;
      margin:0 auto 15px;
    }

    .title{
      text-align:center;
      font-size:20px;
      margin-bottom:20px;
    }

    .row{
      margin-bottom:12px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      cursor:pointer;
      font-weight:700;
    }

    .logout{
      background:#ff4fa3;
      color:#fff;
    }

    .gift{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #3a3a3a;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="avatar"></div>
<button onclick="window.location.href='result.html'" style="
margin-bottom:10px;
background:none;
border:none;
color:#ff4fa3;
font-size:14px;
cursor:pointer;
">← Back</button>
  <div class="title">Your Profile</div>

  <div class="row">
<span>Name:</span>
<div style="display:flex;align-items:center;gap:6px;">
  <strong id="name">-</strong>
  <button onclick="editName()" style="background:none;border:none;cursor:pointer;font-size:14px;">✏️</button>
</div>
  </div>

  <div class="row">
    <span>Email:</span>
    <strong id="email">-</strong>
  </div>

  <div class="row">
    <span>Tokens:</span>
    <strong id="tokens">0</strong>
  </div>

  <button class="btn gift" onclick="goGift()">🎁 Gifts</button>

  <button class="btn logout" onclick="logout()">Logout</button>

</div>

<script>
  if (!localStorage.getItem('userId')) {
  window.location.href = 'login.html';
}
document.getElementById('name').innerText = localStorage.getItem('userName') || 'User';
document.getElementById('email').innerText = localStorage.getItem('userEmail') || '-';

async function loadTokens(){
  console.log('USER ID:', localStorage.getItem('userId'));
  
  try{
    const userId = localStorage.getItem('userId');
const res = await fetch('/api/wallet?userId=' + userId);
    const data = await res.json();
    document.getElementById('tokens').innerText = data.balance || 0;
  }catch(e){
    document.getElementById('tokens').innerText = 0;
  }
}

function logout(){
  localStorage.removeItem('userId');
  localStorage.removeItem('userEmail');
  localStorage.removeItem('userName');
  window.location.href = 'login.html';
}

function goGift(){
  alert('Gift page later');
}

loadTokens();
async function editName(){
  const current = localStorage.getItem('userName') || '';
  const newName = prompt('Enter your name', current);

  if(newName && newName.trim()){

    await fetch('/api/auth', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        type:'update-name',
        name: newName.trim()
      })
    });

    localStorage.setItem('userName', newName.trim());
    document.getElementById('name').innerText = newName.trim();
  }
}
</script>

</body>
</html>
