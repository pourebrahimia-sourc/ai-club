<!DOCTYPE html>
<html>
<head>
  <title>Profile - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    body{
      margin:0;
      min-height:100vh;
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      padding:16px;
    }

    .page{
      max-width:420px;
      margin:0 auto;
    }

    .card{
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .back-btn{
      width:36px;height:36px;border:none;border-radius:10px;
      background:#222;color:#ff4fa3;font-size:16px;cursor:pointer;
    }

    .avatar{
      width:36px;height:36px;border-radius:50%;
      background:#2a2a2a;background-size:cover;background-position:center;
    }

    .mini-info{
      font-size:13px;
      line-height:1.8;
      margin-bottom:12px;
      opacity:0.9;
    }

    .mini-info span{opacity:0.6;}
    .mini-info strong{font-weight:700;}

    .section{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background:#141414;
      border:1px solid #242424;
    }

    .section h3{
      margin:0 0 10px 0;
      font-size:14px;
    }

    .recent{
      min-height:220px;
      opacity:0;
      transition:opacity 0.3s ease;
    }

    .chat-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #252525;
    }

    .chat-avatar{
      width:42px;height:42px;border-radius:50%;
      background:#2a2a2a;background-size:cover;background-position:center;
    }

    .chat-meta{flex:1;}
    .chat-name{font-size:13px;font-weight:700;}
    .chat-date{font-size:11px;opacity:0.6;}

    .chat-btn{
      background:#ff4fa3;
      border:none;
      color:#fff;
      border-radius:10px;
      padding:6px 10px;
      font-size:11px;
      cursor:pointer;
      font-weight:700;
    }

    .btn{
      width:100%;
      padding:11px;
      border:none;
      border-radius:12px;
      margin-top:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
    }

    .dark{background:#2a2a2a;border:1px solid #333;}
    .primary{background:#ff4fa3;}

    .loading-blur{
      filter:blur(5px);
      opacity:0.6;
      transition:0.3s;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-box{
      width:100%;
      max-width:300px;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:16px;
      padding:16px;
      text-align:center;
    }

    .modal-box h3{margin-bottom:10px;}
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="topbar">
      <button class="back-btn" onclick="goBack()">✕</button>
      <div class="avatar" id="avatar"></div>
    </div>

    <div class="mini-info">
      <div><span>Name:</span> <strong id="name">-</strong></div>
      <div><span>Email:</span> <strong id="email">-</strong></div>
      <div><span>Tokens:</span> <strong id="tokens">0</strong></div>
    </div>

    <div class="section">
      <h3>Recent Chats</h3>
      <div id="recentChats" class="recent">
        <div style="opacity:0.6">Loading...</div>
      </div>
    </div>

    <button class="btn dark" onclick="goGift()">🎁 Gifts</button>
    <button class="btn dark" onclick="goSubscribe()">💎 Subscribe</button>
    <button class="btn primary" onclick="logout()">Logout</button>

  </div>
</div>

<!-- Token Modal -->
<div id="tokenModal" class="modal">
  <div class="modal-box">
    <h3>Not enough tokens</h3>
    <p>You need 5 tokens</p>
    <button class="btn primary" onclick="goGift()">Get Tokens</button>
    <button class="btn dark" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
function getToken(){return localStorage.getItem('accessToken');}
if(!getToken()) location.href='login.html';

const nameEl = document.getElementById('name');
const emailEl = document.getElementById('email');
const tokenEl = document.getElementById('tokens');
const recent = document.getElementById('recentChats');
const modal = document.getElementById('tokenModal');

nameEl.classList.add('loading-blur');
tokenEl.classList.add('loading-blur');

async function loadProfile(){
  const res = await fetch('/api/session',{headers:{Authorization:'Bearer '+getToken()}});
  const d = await res.json();
  const s = d.data.session;

  nameEl.innerText = s.profileName || 'User';
  emailEl.innerText = s.user.email || '-';
  tokenEl.innerText = s.balance ?? 0;

  nameEl.classList.remove('loading-blur');
  tokenEl.classList.remove('loading-blur');
}

async function loadChats(){
  const res = await fetch('/api/characters',{headers:{Authorization:'Bearer '+getToken()}});
  const d = await res.json();
  const list = d.characters || [];

  if(!list.length){
    recent.innerHTML = '<div style="opacity:0.6">No chats</div>';
    recent.style.opacity=1;
    return;
  }

  recent.innerHTML='';
  list.forEach(c=>{
    const div=document.createElement('div');
    div.className='chat-item';

    div.innerHTML=`
      <div class="chat-avatar" style="background-image:url('${c.image_url||''}')"></div>
      <div class="chat-meta">
        <div class="chat-name">${c.name||'AI'}</div>
        <div class="chat-date">${new Date(c.created_at).toLocaleDateString()}</div>
      </div>
      <button class="chat-btn">Chat</button>
    `;

    div.querySelector('.chat-btn').onclick=async ()=>{
      const b = await getBalance();
      if(b<5){ modal.style.display='flex'; return; }

      localStorage.setItem('selectedCharacterId',c.id);
      localStorage.setItem('aiName',c.name||'AI');
      localStorage.setItem('aiImage',c.image_url||'');
      location.href='chat.html';
    };

    recent.appendChild(div);
  });

  recent.style.opacity=1;
}

async function getBalance(){
  const r=await fetch('/api/wallet',{headers:{Authorization:'Bearer '+getToken()}});
  const d=await r.json();
  return d.balance||0;
}

function closeModal(){modal.style.display='none';}
function logout(){localStorage.clear();location.href='index.html';}
function goGift(){location.href='gift.html';}
function goSubscribe(){location.href='subscribe.html';}
function goBack(){location.href='index.html';}

loadProfile();
loadChats();
</script>

</body>
</html>
