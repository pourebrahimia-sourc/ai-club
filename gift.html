<!DOCTYPE html>
<html>
<head>
  <title>Gifts - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <style>
    .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .section-title{ font-size:18px; margin:20px 0 10px; font-weight:700; }
    .gift-card{ background:#1a1a1a; border:1px solid #2b2b2b; border-radius:16px; padding:14px; margin-bottom:12px; }
    .gift-row{ display:flex; justify-content:space-between; align-items:center; }
    .gift-title{ font-size:14px; font-weight:700; }
    .gift-desc{ font-size:12px; opacity:0.7; margin-top:4px; }
    .gift-btn{ padding:8px 14px; border-radius:10px; border:none; background:#ff4fa3; color:#fff; font-size:12px; cursor:pointer; font-weight:700; transition: 0.3s; }
    
    .gift-btn:disabled { background: #333 !important; color: #777; cursor: not-allowed; }

.ref-progress {
  position: relative;
  margin-top: 16px;
  padding-top: 20px;
}

.ref-line {
  position: absolute;
  top: 32px;
  left: 0;
  right: 0;
  height: 2px;
  background: #2b2b2b;
}

.ref-steps {
  display: flex;
  justify-content: space-between;
  position: relative;
}

.ref-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 11px;
  gap: 6px;
}

.ref-circle-new {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #111;
  border: 2px solid #2b2b2b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.ref-step.active .ref-circle-new {
  border-color: #ff4fa3;
  color: #ff4fa3;
}

.ref-step.done .ref-circle-new {
  background: #ff4fa3;
  border-color: #ff4fa3;
  color: #fff;
}

.ref-label {
  opacity: 0.7;
}

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #ff4fa3; color: white; padding: 12px 24px;
      border-radius: 14px; font-size: 14px; font-weight: 700;
      display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(255, 79, 163, 0.4);
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- هدر کامل و هماهنگ با بقیه صفحات -->
<div class="header">
  <div style="font-weight:700;font-size:18px; cursor:pointer;" onclick="closePage()">
    ✕
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button onclick="window.location.href='subscribe.html'" style="padding:6px 12px; border-radius:10px; border:none; background:#ff4fa3; color:#fff; font-size:12px; cursor:pointer;">
      Subscribe
    </button>
    <div id="tokenBalance" style="background:#1a1a1a; padding:6px 10px; border-radius:10px; font-size:12px;">
      💰 ...
    </div>
    <div onclick="window.location.href='profile.html'" style="width:34px; height:34px; border-radius:50%; background:#2a2a2a; border:1px solid #3a3a3a; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;">
      <span style="font-size:14px;">👤</span>
    </div>
  </div>
</div>

<div class="gift-card">
  <div class="gift-title">Earn tokens by inviting friends</div>
<div id="refBonusBox" style="
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  opacity:0.8;
">
  <div id="refBonusCheck" style="
    width:18px;
    height:18px;
    border-radius:6px;
    border:1px solid #2b2b2b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
  ">
  </div>
  <div>Referral Bonus (+10 tokens)</div>
</div>
<div class="ref-progress">
  <div class="ref-line"></div>

  <div class="ref-steps">
<div class="ref-step" data-step="5">
  <div class="ref-circle-new">5</div>
  <div class="ref-label">0</div>
</div>

<div class="ref-step" data-step="10">
  <div class="ref-circle-new">10</div>
  <div class="ref-label">10</div>
</div>

<div class="ref-step" data-step="20">
  <div class="ref-circle-new">20</div>
  <div class="ref-label">20</div>
</div>

<div class="ref-step" data-step="50">
  <div class="ref-circle-new">50</div>
  <div class="ref-label">50</div>
</div>
  </div>
</div>

<div id="refAvatars" style="
  display:flex;
  justify-content:center;
  align-items:center;
  gap:0;
  margin-top:16px;
  min-height:38px;
"></div>
<div style="display:flex; gap:8px; margin-top:12px;">
  <input id="refLinkInput" readonly style="
    flex:1;
    height:42px;
    border-radius:10px;
    border:1px solid #2b2b2b;
    background:#111;
    color:#fff;
    padding:0 10px;
    font-size:12px;
  " />

  <button id="copyBtn" class="gift-btn" style="width:90px;">
    Copy
  </button>

</div>
  <button id="inviteBtn" class="gift-btn" style="
  margin-top:10px;
  width:100%;
  height:44px;
  font-size:14px;
">
  Invite Friends
</button>
</div>

<div class="section-title">Earn Tokens</div>
<div class="gift-card">
  <div class="gift-row">
    <div>
      <div class="gift-title">Daily Login</div>
      <div class="gift-desc">Get free tokens every day</div>
    </div>
    <button class="gift-btn" onclick="claimGift('daily', this)">Claim +10</button>
  </div>
</div>

<div class="gift-card">
  <div class="gift-row">
    <div>
      <div class="gift-title">Watch Ads</div>
      <div class="gift-desc">2 ads = 5 tokens</div>
    </div>
    <button class="gift-btn" onclick="claimGift('ad', this)">Watch</button>
  </div>
</div>

<div class="gift-card">
  <div class="gift-row">
    <div>
      <div class="gift-title">Share</div>
      <div class="gift-desc">Share app (2x daily)</div>
    </div>
    <button class="gift-btn" onclick="claimGift('share', this)">Share</button>
  </div>
</div>
<div class="gift-card">
  <div class="gift-row">
    <div>
      <div class="gift-title">Rate App</div>
      <div class="gift-desc">Rate us and get tokens</div>
    </div>
    <button class="gift-btn" onclick="claimGift('rate', this)">Rate</button>
  </div>
</div>
  <div style="margin-top:20px;">
  <button onclick="window.location.href='subscribe.html'" class="gift-btn" style="
    width:100%;
    height:48px;
    font-size:14px;
  ">
    Get More Tokens
  </button>
</div>
<script>
function closePage(){
  const returnTo = localStorage.getItem('chatReturnTo');

  if(returnTo){
    localStorage.removeItem('chatReturnTo');
    window.location.href = returnTo;
    return;
  }

  const from = localStorage.getItem('funnelFrom');

  if (from === 'result') {
    window.location.href = 'result.html';
  } else {
    window.location.href = 'index.html';
  }
}
function getAccessToken(){ return localStorage.getItem('accessToken') || ''; }
function authHeaders(extra = {}){
  const token = getAccessToken();
  return token ? { ...extra, Authorization: 'Bearer ' + token } : extra;
}

function showNotification(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

// تابع جدید برای آپدیت لحظه‌ای موجودی در هدر
async function refreshHeaderBalance() {
  try {
    const res = await fetch('/api/wallet', { headers: authHeaders() });
    const data = await res.json();
    if (data.balance !== undefined) {
      document.getElementById('tokenBalance').innerText = "💰 " + data.balance;
    }
  } catch (e) {
    document.getElementById('tokenBalance').innerText = "💰 0";
  }
}

async function claimGift(type, btn) {
  if (type === 'rate') {
  const alreadyRated = localStorage.getItem('rated');

  if (alreadyRated) {
    showNotification('Already rated');
    btn.disabled = true;
    btn.style.background = '#333';
    btn.style.color = '#777';
    return;
  }

  localStorage.setItem('rated', '1');

  showNotification('Thanks for rating! +5 tokens');
  btn.innerText = 'Rated';
  btn.disabled = true;
  btn.style.background = '#333';
  btn.style.color = '#777';

  return;
}
  if (type === 'ad') {
  showNotification('Available in app only');
  btn.disabled = true;
  btn.style.background = '#333';
  btn.style.color = '#777';
  return;
}
  if (type === 'share') {
  if (referralLink) {
    navigator.clipboard.writeText(referralLink);
    showNotification('Link copied! Share it with friends');
  } else {
    showNotification('Referral link not ready');
  }
  return;
}
  const originalText = btn.innerText;
  btn.innerText = '...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/gifts', {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ type })
    });
    const data = await res.json();
    
    if (data.error) {
      showNotification(data.error === 'Already claimed today' ? 'Already claimed today!' : data.error);
      if (data.error !== 'Already claimed today') {
        btn.disabled = false;
        btn.innerText = originalText;
     } else {
  btn.innerText = 'Claimed';
  btn.style.background = '#333';
  btn.style.color = '#777';
}
    } else {
      btn.innerText = 'Claimed';
      btn.style.background = '#333';
btn.style.color = '#777';
      showNotification('Success! Tokens added.');
      // بلافاصله موجودی هدر را آپدیت کن
      refreshHeaderBalance();
    }
  } catch (e) { 
    showNotification('Connection error');
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

let referralLink = '';
async function loadReferralData() {
  try {
    const res = await fetch('/api/referral-data', {
      headers: authHeaders()
    });

    const data = await res.json();

if (data.referralCode) {
  referralLink = window.location.origin + '/index.html?ref=' + data.referralCode;
  document.getElementById('refLinkInput').value = referralLink;
}
const avatarsBox = document.getElementById('refAvatars');
avatarsBox.innerHTML = '';

(data.avatars || []).forEach(a => {
  const div = document.createElement('div');

  div.style.width = '32px';
  div.style.height = '32px';
  div.style.borderRadius = '50%';
  div.style.background = '#2a2a2a';

  if (a.avatarUrl) {
    div.style.backgroundImage = `url(${a.avatarUrl})`;
    div.style.backgroundSize = 'cover';
    div.style.backgroundPosition = 'center';
  } else {
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    div.style.justifyContent = 'center';
    div.style.fontSize = '14px';
    div.innerText = '👤';
  }
if (avatarsBox.children.length === 0) {
  div.style.marginLeft = '0px';
} else {
  div.style.marginLeft = '-8px';
}

avatarsBox.appendChild(div);
});
    const checkBox = document.getElementById('refBonusCheck');

// فعلاً ساده: اگر referralCount > 0 یعنی با رفرال اومده
if (data.usedReferral) {
  checkBox.innerText = '✔';
  checkBox.style.borderColor = '#ff4fa3';
  checkBox.style.color = '#ff4fa3';
} else {
  checkBox.innerText = '';
}
    const steps = document.querySelectorAll('.ref-step');

steps.forEach(step => {
  const value = parseInt(step.dataset.step);

  step.classList.remove('done', 'active');

if (data.referralCount >= value) {
  step.classList.add('done');
} else if (data.referralCount > 0) {
  const prev = value === 5 ? 0 : value === 10 ? 5 : value === 20 ? 10 : 20;

  if (data.referralCount >= prev && data.referralCount < value) {
    step.classList.add('active');
  }
}
});
    document.querySelectorAll('.ref-step').forEach(step => {
  const label = step.querySelector('.ref-label');
  if (label) {
    label.innerText = data.referralCount;
  }
});
  } catch (e) {
    console.log('Referral load error');
  }
}

function copyReferral() {
  if (!referralLink) {
    showNotification('Referral link is loading');
    return;
  }
document.getElementById('refLinkInput').select();
  navigator.clipboard.writeText(referralLink).then(() => {
    showNotification('Referral link copied!');
  });
}

// اجرای توابع در بدو ورود به صفحه
document.addEventListener('DOMContentLoaded', () => {
  if(!getAccessToken()){
    localStorage.setItem('loginReturnTo', 'gift.html');
    window.location.href = 'login.html';
    return;
  }

  refreshHeaderBalance();
    loadReferralData();

  document.getElementById('copyBtn').onclick = copyReferral;
document.getElementById('inviteBtn').onclick = () => {
  const modal = document.getElementById('inviteModal');
  const canvas = document.getElementById('qrCanvas');

  modal.style.display = 'flex';

  if (referralLink) {
QRCode.toCanvas(canvas, referralLink, {
  width: 86,
  margin: 1
});
  }
};

  document.getElementById('copyBtn').onclick = copyReferral;

  document.getElementById('inviteBtn').onclick = () => {
    const modal = document.getElementById('inviteModal');
    const canvas = document.getElementById('qrCanvas');

    modal.style.display = 'flex';

    if (referralLink) {
      QRCode.toCanvas(canvas, referralLink, {
        width: 86,
        margin: 1
      });
    }
  };

  document.getElementById('closeInvite').onclick = () => {
    document.getElementById('inviteModal').style.display = 'none';
  };

  document.getElementById('shareBtn').onclick = async () => {
    const card = document.getElementById('shareCard');
    if (!card || !referralLink) return;

    const canvas = await html2canvas(card);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if (!blob) return;

    const file = new File([blob], 'ai-club-invite.png', { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'AI Club 💖',
        text: referralLink
      });
    } else {
      await navigator.clipboard.writeText(referralLink);
      showNotification('Referral link copied!');
    }
  };
});
</script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<div id="inviteModal" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  display:none; align-items:center; justify-content:center; z-index:999;
">
  <div id="inviteCard" style="
    width:90%; max-width:330px; background:#1a1a1a;
    border-radius:18px; padding:14px; text-align:center;
    border:1px solid #2b2b2b;
  ">
    <div id="shareCard" style="
  background:#1a1a1a;
  color:#fff;
  border-radius:18px;
  padding:14px;
">
    <div style="font-weight:800;font-size:17px;">AI Club 💖</div>
    <div style="font-size:12px;opacity:.72;margin:4px 0 12px;">
      Create your perfect AI girlfriend
    </div>

    <div style="position:relative;border-radius:16px;overflow:hidden;">
      <img src="images/locked-preview.png" style="
        width:100%; display:block; border-radius:16px;
      ">

      <div style="
        position:absolute; right:10px; bottom:10px;
        background:#fff; padding:7px; border-radius:12px;
        box-shadow:0 8px 24px rgba(0,0,0,.35);
      ">
        <canvas id="qrCanvas"></canvas>
      </div>

      <div style="
        position:absolute; left:10px; bottom:12px;
        background:rgba(0,0,0,.55); color:#fff;
        padding:6px 10px; border-radius:999px;
        font-size:11px; font-weight:700;
        backdrop-filter:blur(6px);
      ">
        Scan & join 🔥
      </div>
    </div>
    </div>
    <button id="shareBtn" class="gift-btn" style="margin-top:12px;width:100%;">
      Share Card
    </button>

    <button id="chooseImageBtn" class="gift-btn" style="margin-top:8px;width:100%;background:#333;">
      Choose Image
    </button>

    <button id="closeInvite" class="gift-btn" style="margin-top:8px;width:100%;background:#444;">
      Close
    </button>
  </div>
</div>
</body>
</html>
