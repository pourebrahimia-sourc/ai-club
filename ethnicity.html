<!DOCTYPE html>
<html>
<head>
<title>Ethnicity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;padding:20px;}
.logo{text-align:center;margin-bottom:20px;}
.card{display:flex;align-items:center;background:#1a1a1a;padding:10px;border-radius:14px;margin-bottom:10px;border:1px solid #2b2b2b;}
.card img{width:40%;height:80px;object-fit:cover;border-radius:10px;}
.card span{margin-left:10px;color:#ff4fa3;font-weight:700;}
</style>
</head>
<body>
<div class="logo">AI Club</div>
<h2>Ethnicity</h2>

<div class="card" onclick="go('caucasian')"><img src="images/eth1.png"><span>Caucasian</span></div>
<div class="card" onclick="go('asian')"><img src="images/eth2.png"><span>Asian</span></div>
<div class="card" onclick="go('latina')"><img src="images/eth3.png"><span>Latina</span></div>
<div class="card" onclick="go('black')"><img src="images/eth4.png"><span>Black</span></div>
<div class="card" onclick="go('middle-eastern')"><img src="images/eth5.png"><span>Middle Eastern</span></div>

<script>
function go(v){localStorage.setItem("ethnicity",v);location.href="body.html";}
</script>
</body>
</html>
