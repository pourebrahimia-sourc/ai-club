<!DOCTYPE html>
<html>
<head>
  <title>Choose Ethnicity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="logo">AI Club</div>

<div class="top-row">
  <button class="back-btn" onclick="goBack()">←</button>

  <div class="steps">
    <span class="step-dot"></span>
    <span class="step-dot active"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
  </div>

  <button id="forwardBtn" class="forward-btn" disabled onclick="goForward()">→</button>
</div>

<h2 class="title">Choose Ethnicity</h2>

<div class="age-grid">

<div class="age-card" data-value="european" onclick="select('european', this)">
  <div class="age-image">
    <img src="images/eth1.jpg">
  </div>
  <div class="age-label">European</div>
</div>

<div class="age-card" data-value="asian" onclick="select('asian', this)">
  <div class="age-image">
    <img src="images/eth2.jpg">
  </div>
  <div class="age-label">Asian</div>
</div>

<div class="age-card" data-value="latina" onclick="select('latina', this)">
  <div class="age-image">
    <img src="images/eth3.jpg">
  </div>
  <div class="age-label">Latina</div>
</div>

<div class="age-card" data-value="black" onclick="select('black', this)">
  <div class="age-image">
    <img src="images/eth4.jpg">
  </div>
  <div class="age-label">Black</div>
</div>

</div>

<button id="nextBtn" class="btn" disabled onclick="nextStep()">
  Continue
</button>

<script>
let selected = "";

function select(val, el){
  selected = val;

  document.querySelectorAll(".age-card").forEach(c=>{
    c.classList.remove("selected");
  });

  el.classList.add("selected");

  document.getElementById("nextBtn").disabled = false;
  document.getElementById("forwardBtn").disabled = false;
}

function nextStep(){
  if(!selected) return;
  localStorage.setItem("ethnicity", selected);
  window.location.href = "body.html";
}

function goBack(){
  history.back();
}

function goForward(){
  if(!selected) return;
  window.location.href = "body.html";
}

document.addEventListener("DOMContentLoaded", ()=>{
  const saved = localStorage.getItem("ethnicity");
  if(!saved) return;

  document.querySelectorAll(".age-card").forEach(card=>{
    if(card.dataset.value === saved){
      card.classList.add("selected");
      selected = saved;

      document.getElementById("nextBtn").disabled = false;
      document.getElementById("forwardBtn").disabled = false;
    }
  });
});
</script>

</body>
</html>
