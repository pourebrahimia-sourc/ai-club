<!DOCTYPE html>
<html>
<head>
  <title>Scenario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="logo">AI Club</div>

<h2 class="title">Scenario</h2>

<div class="age-grid">

<div class="age-card" data-value="girlfriend" onclick="select('girlfriend', this)">
  <div class="age-image">
    <img src="images/s1.jpg">
  </div>
  <div class="age-label">Girlfriend</div>
</div>

<div class="age-card" data-value="bestfriend" onclick="select('bestfriend', this)">
  <div class="age-image">
    <img src="images/s2.jpg">
  </div>
  <div class="age-label">Best Friend</div>
</div>

<div class="age-card" data-value="stranger" onclick="select('stranger', this)">
  <div class="age-image">
    <img src="images/s3.jpg">
  </div>
  <div class="age-label">Stranger</div>
</div>

<div class="age-card" data-value="wife" onclick="select('wife', this)">
  <div class="age-image">
    <img src="images/s4.jpg">
  </div>
  <div class="age-label">Wife</div>
</div>

</div>

<button id="nextBtn" class="btn" disabled onclick="nextStep()">Finish</button>

<script>
let selected="";

function select(val,el){
  selected=val;
  document.querySelectorAll(".age-card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("nextBtn").disabled=false;
}

function nextStep(){
  localStorage.setItem("scenario",selected);
  window.location.href="result.html";
}
</script>

</body>
</html>
