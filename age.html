<!DOCTYPE html>
<html>
<head>
  <title>Age</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{margin:0;background:#111;color:#fff;font-family:sans-serif;padding:20px;}
    .logo{text-align:center;margin-bottom:20px;}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .card{background:#1a1a1a;border-radius:14px;padding:10px;cursor:pointer;border:1px solid #2b2b2b;}
    .card img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;}
    .card span{display:block;text-align:center;margin-top:8px;color:#ff4fa3;font-weight:700;}
    .card.selected{border:1px solid #ff4fa3;}
  </style>
</head>
<body>
<div class="logo">AI Club</div>
<div class="top"><button onclick="history.back()">←</button></div>
<h2>Choose Age</h2>

<div class="grid">
<div class="card" onclick="select('18-21',this)"><img src="images/age1.png"><span>18–21</span></div>
<div class="card" onclick="select('22-25',this)"><img src="images/age2.png"><span>22–25</span></div>
<div class="card" onclick="select('26-30',this)"><img src="images/age3.png"><span>26–30</span></div>
<div class="card" onclick="select('30+',this)"><img src="images/age4.png"><span>30+</span></div>
</div>

<script>
function select(v,e){
localStorage.setItem("age",v);
document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
e.classList.add('selected');
location.href="ethnicity.html";
}
</script>
</body>
</html>
