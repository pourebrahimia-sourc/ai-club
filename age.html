<!DOCTYPE html>
<html>
<head>
  <title>Choose Age</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="logo">AI Club</div>

<div class="top-row">
  <button class="back-btn" onclick="goBack()">←</button>

  <div class="steps">
    <span class="step-dot active"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
  </div>
</div>

<h2 class="title">Choose Age</h2>
<p class="subtitle">Pick one range</p>

<div class="age-grid">

  <div class="age-card" data-value="18-21" onclick="selectAge('18-21', this)">
    <div class="age-image"></div>
    <div class="age-label">18–21</div>
  </div>

  <div class="age-card" data-value="22-25" onclick="selectAge('22-25', this)">
    <div class="age-image"></div>
    <div class="age-label">22–25</div>
  </div>

  <div class="age-card" data-value="26-30" onclick="selectAge('26-30', this)">
    <div class="age-image"></div>
    <div class="age-label">26–30</div>
  </div>

  <div class="age-card" data-value="30+" onclick="selectAge('30+', this)">
    <div class="age-image"></div>
    <div class="age-label">30+</div>
  </div>

</div>

<button id="nextBtn" class="btn btn-disabled" disabled onclick="nextStep()">
  Next
</button>

<script>
let selectedAge = "";

function selectAge(age, el){
  selectedAge = age;

  document.querySelectorAll(".age-card").forEach(c=>{
    c.classList.remove("selected");
  });

  el.classList.add("selected");

  const btn = document.getElementById("nextBtn");
  btn.disabled = false;
  btn.classList.remove("btn-disabled");
}

function nextStep(){
  localStorage.setItem("age", selectedAge);
  window.location.href = "ethnicity.html";
}

function goBack(){
  history.back();
}

// 🔥 این مهمه — بدون onload
const saved = localStorage.getItem("age");
if(saved){
  document.addEventListener("DOMContentLoaded", ()=>{
    document.querySelectorAll(".age-card").forEach(card=>{
      if(card.dataset.value === saved){
        card.classList.add("selected");
        selectedAge = saved;

        const btn = document.getElementById("nextBtn");
        btn.disabled = false;
        btn.classList.remove("btn-disabled");
      }
    });
  });
}
</script>

</body>
</html>
