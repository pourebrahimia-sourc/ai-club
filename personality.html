<!DOCTYPE html>
<html>
<head>
  <title>Personality</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="logo">AI Club</div>

<div class="top-row">
  <button class="back-btn" onclick="goBack()">←</button>

  <div class="steps">
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot"></span>
    <span class="step-dot active"></span>
    <span class="step-dot"></span>
  </div>

  <button id="forwardBtn" class="forward-btn" disabled onclick="goForward()">→</button>
</div>

<h2 class="title">Personality</h2>
<p class="subtitle">Choose one main vibe</p>

<div class="age-grid">

  <div class="age-card" data-value="soft" onclick="select('soft', this)">
    <div class="age-image"></div>
    <div class="age-label">Soft</div>
  </div>

  <div class="age-card" data-value="wild" onclick="select('wild', this)">
    <div class="age-image"></div>
    <div class="age-label">Wild</div>
  </div>

  <div class="age-card" data-value="caring" onclick="select('caring', this)">
    <div class="age-image"></div>
    <div class="age-label">Caring</div>
  </div>

  <div class="age-card" data-value="dominant" onclick="select('dominant', this)">
    <div class="age-image"></div>
    <div class="age-label">Dominant</div>
  </div>

</div>

<button id="nextBtn" class="btn" disabled onclick="nextStep()">Continue</button>

<script>
let selected = "";

function select(val, el){
  selected = val;

  document.querySelectorAll(".age-card").forEach(c=>{
    c.classList.remove("selected");
  });

  el.classList.add("selected");

  document.getElementById("nextBtn").disabled = false;
  document.getElementById("forwardBtn").disabled = false;
}

function nextStep(){
  if(!selected) return;
  localStorage.setItem("personality", selected);
  window.location.href = "scenario.html";
}

function goBack(){
  history.back();
}

function goForward(){
  if(!selected) return;
  window.location.href = "scenario.html";
}

document.addEventListener("DOMContentLoaded", ()=>{
  const saved = localStorage.getItem("personality");
  if(!saved) return;

  document.querySelectorAll(".age-card").forEach(card=>{
    if(card.dataset.value === saved){
      card.classList.add("selected");
      selected = saved;
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("forwardBtn").disabled = false;
    }
  });
});
</script>

</body>
</html>
