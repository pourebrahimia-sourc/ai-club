<!DOCTYPE html>
<html>
<head>
  <title>Appearance Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="logo">AI Club</div>
<div class="top-row">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="steps">
    <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot active"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
  </div>
</div>
<h2 class="title">Appearance Details</h2>
<p class="subtitle">Any specific preferences?<br>You can choose all that excites you</p>
<div class="chip-grid">
  <button class="chip" data-value="tattoos" onclick="toggleChip(this)">Tattoos</button>
  <button class="chip" data-value="freckles" onclick="toggleChip(this)">Freckles</button>
  <button class="chip" data-value="tooth-gap" onclick="toggleChip(this)">Tooth gap</button>
  <button class="chip" data-value="makeup" onclick="toggleChip(this)">Makeup</button>
  <button class="chip" data-value="body-hair" onclick="toggleChip(this)">Body hair</button>
  <button class="chip" data-value="no-makeup" onclick="toggleChip(this)">No makeup</button>
</div>
<button id="nextBtn" class="btn" disabled onclick="nextStep()">Continue</button>
<script>
let selected = [];
function toggleChip(el){
  const value = el.dataset.value;
  if(selected.includes(value)){
    selected = selected.filter(item => item !== value);
    el.classList.remove('selected');
  }else{
    selected.push(value);
    el.classList.add('selected');
  }
  document.getElementById('nextBtn').disabled = selected.length === 0;
}
function nextStep(){
  if(selected.length === 0) return;
  localStorage.setItem('appearanceDetails', JSON.stringify(selected));
  window.location.href = 'preferences.html';
}
function goBack(){ history.back(); }
document.addEventListener('DOMContentLoaded', ()=>{
  const saved = JSON.parse(localStorage.getItem('appearanceDetails') || '[]');
  if(!saved.length) return;
  selected = saved;
  document.querySelectorAll('.chip').forEach(chip => {
    if(selected.includes(chip.dataset.value)) chip.classList.add('selected');
  });
  document.getElementById('nextBtn').disabled = false;
});
</script>
</body>
</html>
