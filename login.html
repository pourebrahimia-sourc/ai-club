<!DOCTYPE html>
<html>
<head>
  <title>Login - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body{
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      margin:0;
      padding:24px 16px;
    }
    .back-top{
      max-width:420px;
      margin:0 auto 14px auto;
    }
    .back-btn{
      width:44px;
      height:44px;
      border-radius:999px;
      border:1px solid rgba(255,79,163,0.45);
      background:rgba(255,79,163,0.08);
      color:#ff4fa3;
      font-size:22px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .login-wrap{
      max-width:420px;
      margin:40px auto;
    }
    .login-card{
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:20px;
    }
    .login-title{
      text-align:center;
      font-size:26px;
      margin:0 0 8px 0;
    }
    .login-subtitle{
      text-align:center;
      font-size:14px;
      color:rgba(255,255,255,0.7);
      margin:0 0 20px 0;
      line-height:1.5;
    }
    .field{
      margin-bottom:12px;
    }
    .field input{
      width:100%;
      height:50px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#111;
      border:1px solid #2b2b2b;
      color:#fff;
      padding:0 14px;
      font-size:15px;
    }
    .btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      margin-top:10px;
    }
    .btn-primary{
      background:#ff4fa3;
      color:#fff;
    }
    .btn-dark{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #3a3a3a;
    }
    .login-links{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .login-links .btn{
      margin-top:0;
    }
    .status{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      min-height:18px;
      color:#ff9ac8;
      line-height:1.5;
      word-break:break-word;
    }
  </style>
</head>
<body>

<div class="back-top">
  <button class="back-btn" onclick="history.back()">←</button>
</div>

<div class="login-wrap">
  <div class="logo">AI Club</div>

  <div class="login-card">
    <h2 class="login-title">Login</h2>
    <p class="login-subtitle">Sign in to continue to your AI girlfriend</p>

    <div class="field">
      <input id="email" type="email" placeholder="Email" />
    </div>

    <div class="field">
      <input id="password" type="password" placeholder="Password" />
    </div>

    <button class="btn btn-primary" onclick="signIn()">Login</button>

    <div class="login-links">
      <button class="btn btn-dark" onclick="signUp()">Sign Up</button>
      <button class="btn btn-dark" onclick="googleLogin()">Google</button>
    </div>

    <div id="status" class="status"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  // اینجا URL و Publishable/Anon Key واقعی پروژه‌ات را بگذار
  const supabaseUrl = 'PASTE_YOUR_SUPABASE_URL_HERE';
  const supabaseKey = 'PASTE_YOUR_SUPABASE_ANON_OR_PUBLISHABLE_KEY_HERE';

  const supabase = createClient(supabaseUrl, supabaseKey);
  const statusEl = document.getElementById('status');

  function setStatus(text) {
    statusEl.innerText = text || '';
  }

  async function ensureWallet(userId) {
    try {
      const { data: existingWallet, error: selectError } = await supabase
        .from('wallets')
        .select('id')
        .eq('user_id', userId)
        .maybeSingle();

      if (selectError) return;

      if (!existingWallet) {
        await supabase
          .from('wallets')
          .insert([{ user_id: userId, balance: 10 }]);
      }
    } catch (e) {}
  }

  async function saveUserAndGo(user) {
    localStorage.setItem('userId', user.id);
    localStorage.setItem('userEmail', user.email || '');
    await ensureWallet(user.id);
    window.location.href = 'result.html';
  }

  window.signUp = async function () {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      setStatus('Enter email and password');
      return;
    }

    setStatus('Creating account...');

    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      setStatus(error.message);
      return;
    }

    if (data.user) {
      await saveUserAndGo(data.user);
    } else {
      setStatus('Check your email if confirmation is required');
    }
  };

  window.signIn = async function () {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      setStatus('Enter email and password');
      return;
    }

    setStatus('Logging in...');

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      setStatus(error.message);
      return;
    }

    if (data.user) {
      await saveUserAndGo(data.user);
    }
  };

  window.googleLogin = async function () {
    setStatus('Opening Google...');

    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/login.html'
      }
    });

    if (error) {
      setStatus(error.message);
    }
  };

  const { data: { session } } = await supabase.auth.getSession();

  if (session?.user) {
    await saveUserAndGo(session.user);
  }
</script>

</body>
</html>
