<!DOCTYPE html>
<html>
<head>
  <title>Your AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="logo">AI Club</div>
<h2 class="title">Your AI Girlfriend is Ready ✨</h2>
<p class="subtitle">Here is your custom match</p>
<div class="summary-card">
  <div class="summary-row"><span>Age:</span><strong id="age"></strong></div>
  <div class="summary-row"><span>Ethnicity:</span><strong id="ethnicity"></strong></div>
  <div class="summary-row"><span>Body:</span><strong id="body"></strong></div>
  <div class="summary-row"><span>Body Details:</span><strong id="bodyDetails"></strong></div>
  <div class="summary-row"><span>Hair:</span><strong id="hair"></strong></div>
  <div class="summary-row"><span>Appearance:</span><strong id="appearanceDetails"></strong></div>
  <div class="summary-row"><span>Personality:</span><strong id="personality"></strong></div>
</div>
<button class="btn" onclick="startChat()">Start Chat</button>
<script src="storage.js"></script>
<script>
function formatText(text){
  if(!text) return '-';
  return text.replaceAll('-', ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function startChat(){
  window.location.href = 'chat.html';
}

document.addEventListener('DOMContentLoaded', ()=>{
  const profile = getProfile();

  document.getElementById('age').textContent = formatText(profile.age);
  document.getElementById('ethnicity').textContent = formatText(profile.ethnicity);
  document.getElementById('body').textContent = formatText(profile.body);
  document.getElementById('bodyDetails').textContent = formatText(profile.bodyDetails);
  document.getElementById('hair').textContent = formatText(profile.hair);
  document.getElementById('appearanceDetails').textContent = formatText(profile.appearanceDetails);
  document.getElementById('personality').textContent = formatText(profile.personality);
});
</script>
</body>
</html>
