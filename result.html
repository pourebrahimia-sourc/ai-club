<!DOCTYPE html>
<html>
<head>
  <title>Your AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="header" style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

  <div style="font-weight:700;font-size:18px;">
    AI Club
  </div>

  <div style="display:flex;align-items:center;gap:10px;">

    <button style="
    padding:6px 12px;
    border-radius:10px;
    border:none;
    background:#ff4fa3;
    color:#fff;
    font-size:12px;
    ">
      Subscribe
    </button>

    <div id="tokenBalance" style="
    background:#1a1a1a;
    padding:6px 10px;
    border-radius:10px;
    font-size:12px;
    ">
      💰 ...
    </div>

    <div style="
    font-size:18px;
    cursor:pointer;
    ">
      🎁
    </div>

  </div>

</div>

<h2 class="title" style="font-size:18px;margin-bottom:6px;">
  Your AI Girlfriend ✨
</h2>

<p class="subtitle" style="font-size:13px;margin-bottom:12px;">
  Your custom match
</p>

<div id="aiImageBox" style="
margin-bottom:10px;
text-align:center;
display:flex;
justify-content:center;
position:relative;
">
  <div id="imageLoading" style="
  display:none;
  position:absolute;
  inset:0;
  z-index:7;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.28);
  border-radius:18px;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  pointer-events:none;
  ">
    <div style="
    width:64px;
    height:64px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.18);
    border-top:3px solid #ff4fa3;
    animation:spin 0.9s linear infinite;
    box-shadow:0 0 24px rgba(255,79,163,0.35);
    "></div>
  </div>

  <div id="imageLock" style="
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:6;
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  background:rgba(0,0,0,0.52);
  border:1.5px solid rgba(255,255,255,0.7);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  color:#fff;
  cursor:pointer;
  ">
    <div style="font-size:34px;line-height:1;">🔒</div>
    <div style="font-size:12px;font-weight:700;line-height:1.2;">Unlock</div>
    <div style="font-size:11px;opacity:0.9;line-height:1;">10 tokens</div>
  </div>

  <img id="aiImage" src="images/locked-preview.png" style="
  width:42%;
  max-width:210px;
  height:auto;
  border-radius:14px;
  display:block;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  filter: blur(20px);
  opacity:1;
  transition:opacity 0.45s ease, filter 0.45s ease;
  ">
<div style="
position:absolute;
bottom:12px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:10;
">

  <button onclick="startChat()" style="
  flex:1;
  margin-right:8px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#ff4fa3,#ff7ac6);
  color:#fff;
  font-weight:700;
    height:48px;
    font-size:14px;
    cursor:pointer;
  ">
    Start Chat
  </button>

  <button id="editBtn" onclick="editCharacter()" style="
  flex:1;
  margin-left:8px;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.12);
  color:#fff;
  font-weight:700;
  backdrop-filter:blur(10px);
    height:48px;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
opacity:0.9;
  ">
    Edit
  </button>

</div>  
</div>
<div class="summary-card" style="font-size:13px; padding:12px; max-width:420px; margin:0 auto;">
  <div class="summary-row"><span>Age:</span><strong id="age"></strong></div>
  <div class="summary-row"><span>Ethnicity:</span><strong id="ethnicity"></strong></div>
  <div class="summary-row"><span>Body:</span><strong id="body"></strong></div>
  <div class="summary-row"><span>Body Details:</span><strong id="bodyDetails"></strong></div>
  <div class="summary-row"><span>Hair:</span><strong id="hair"></strong></div>
  <div class="summary-row"><span>Appearance:</span><strong id="appearanceDetails"></strong></div>
  <div class="summary-row"><span>Personality:</span><strong id="personality"></strong></div>
<button class="btn" style="margin-top:10px;height:44px;font-size:14px;">Generate Voice</button>

<button class="btn" style="margin-top:10px;height:44px;font-size:14px;background:#2a2a2a;border:1px solid #3a3a3a;">
Video Chat (Coming Soon)
</button>
</div>


<div id="tokenModal" style="
display:none;
position:fixed;
inset:0;
z-index:20;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
  width:100%;
  max-width:320px;
  background:#1a1a1a;
  border:1px solid #2b2b2b;
  border-radius:18px;
  padding:18px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  ">
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">
      Not enough tokens
    </div>
    <div style="font-size:13px;opacity:0.82;line-height:1.5;margin-bottom:16px;">
      You need 10 tokens to unlock this image.
    </div>

    <button id="getTokensBtn" class="btn" style="margin-bottom:10px;">
      Get Tokens
    </button>

    <button id="subscribeBtn" class="btn" style="
    background:#2a2a2a;
    border:1px solid #3a3a3a;
    ">
      Subscribe
    </button>

    <div id="closeTokenModal" style="
    margin-top:14px;
    font-size:12px;
    opacity:0.7;
    cursor:pointer;
    ">
      Close
    </div>
  </div>
</div>

<script>
function formatText(text) {
  if (!text) return '-';
  return text.replaceAll('-', ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function startChat() {
  window.location.href = 'chat.html';
}

const profile = {
  age: localStorage.getItem('age'),
  ethnicity: localStorage.getItem('ethnicity'),
  body: localStorage.getItem('body'),
  bodyDetails: localStorage.getItem('bodyDetails'),
  hair: localStorage.getItem('hair'),
  appearanceDetails: localStorage.getItem('appearanceDetails'),
  personality: localStorage.getItem('personality')
};

const img = document.getElementById('aiImage');
const loading = document.getElementById('imageLoading');
const imageLock = document.getElementById('imageLock');
const tokenEl = document.getElementById('tokenBalance');
const tokenModal = document.getElementById('tokenModal');
const closeTokenModal = document.getElementById('closeTokenModal');
const getTokensBtn = document.getElementById('getTokensBtn');
const subscribeBtn = document.getElementById('subscribeBtn');
  const editBtn = document.getElementById('editBtn');

function openTokenModal() {
  tokenModal.style.display = "flex";
}

function closeModal() {
  tokenModal.style.display = "none";
}

async function refreshBalance() {
  try {
    const res = await fetch('/api/wallet');
    const data = await res.json();
    if (data.balance !== undefined) {
      tokenEl.innerText = "💰 " + data.balance;
    } else {
      tokenEl.innerText = "💰 0";
    }
  } catch (e) {
    tokenEl.innerText = "💰 0";
  }
}
const currentProfileKey = JSON.stringify(profile);
const lastProfileKey = localStorage.getItem('lastProfileKey');
const sameProfile = currentProfileKey === lastProfileKey;
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('age').textContent = formatText(localStorage.getItem('age'));
  document.getElementById('ethnicity').textContent = formatText(localStorage.getItem('ethnicity'));
  document.getElementById('body').textContent = formatText(localStorage.getItem('body'));
  document.getElementById('bodyDetails').textContent = formatText(localStorage.getItem('bodyDetails'));
  document.getElementById('hair').textContent = formatText(localStorage.getItem('hair'));
  document.getElementById('appearanceDetails').textContent = formatText(localStorage.getItem('appearanceDetails'));
  document.getElementById('personality').textContent = formatText(localStorage.getItem('personality'));

  await refreshBalance();

const savedImage = localStorage.getItem('aiImage');
const imageUnlocked = localStorage.getItem('imageUnlocked') === "true";

if (sameProfile && imageUnlocked && savedImage) {
  img.src = savedImage;
  img.style.filter = "blur(0px)";
  imageLock.style.display = "none";
  editBtn.style.display = "none";
} else {
  editBtn.style.display = "flex";
  localStorage.removeItem('aiImage');
  localStorage.removeItem('imageUnlocked');
  img.src = "images/locked-preview.png";
  img.style.filter = "blur(20px)";
  imageLock.style.display = "flex";
}
  localStorage.setItem('lastProfileKey', currentProfileKey);
});

imageLock.addEventListener('click', async () => {
  if (loading.style.display === "flex") return;

  loading.style.display = "flex";
  imageLock.style.pointerEvents = "none";

  try {
    const res = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        msg: "generate image",
        name: "Luna",
        profile
      })
    });

    const data = await res.json();

    if (data.error === "Not enough tokens") {
      loading.style.display = "none";
      imageLock.style.pointerEvents = "auto";
      openTokenModal();
      return;
    }

if (data.imageUrl) {
  img.style.opacity = "0";

  img.onload = () => {
    loading.style.display = "none";
    img.style.filter = "blur(0px)";
    imageLock.style.display = "none";
    img.style.opacity = "1";
  };

  img.src = data.imageUrl;

  localStorage.setItem('aiImage', data.imageUrl);
  localStorage.setItem('imageUnlocked', "true");

  if (data.balance !== undefined) {
    tokenEl.innerText = "💰 " + data.balance;
  } else {
    await refreshBalance();
  }

  return;
}

    loading.style.display = "none";
    imageLock.style.pointerEvents = "auto";
    alert("Error generating image");
  } catch (err) {
    loading.style.display = "none";
    imageLock.style.pointerEvents = "auto";
    alert("Error generating image");
  }
});

closeTokenModal.addEventListener('click', closeModal);
tokenModal.addEventListener('click', (e) => {
  if (e.target === tokenModal) closeModal();
});

getTokensBtn.addEventListener('click', () => {
  closeModal();
});

subscribeBtn.addEventListener('click', () => {
  closeModal();
});
  function editCharacter() {
  window.location.href = "age.html";
}
</script>
</body>
</html>
