<!DOCTYPE html>
<html>
<head>
  <title>Your AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <style>
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="header" style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

  <!-- LEFT -->
  <div style="font-weight:700;font-size:18px;">
    AI Club
  </div>

  <!-- RIGHT -->
  <div style="display:flex;align-items:center;gap:10px;">

    <button style="
    padding:6px 12px;
    border-radius:10px;
    border:none;
    background:#ff4fa3;
    color:#fff;
    font-size:12px;
    ">
      Subscribe
    </button>

<div id="tokenBalance" style="
background:#1a1a1a;
padding:6px 10px;
border-radius:10px;
font-size:12px;
">
  💰 ...
</div>

    <div style="
    font-size:18px;
    cursor:pointer;
    ">
      🎁
    </div>

  </div>

</div>
<h2 class="title" style="font-size:18px;margin-bottom:6px;">
  Your AI Girlfriend ✨
</h2>

<p class="subtitle" style="font-size:13px;margin-bottom:12px;">
  Your custom match
</p>
  <div id="aiImageBox" style="
margin-bottom:20px;
text-align:center;
display:flex;
justify-content:center;
position:relative;
">
<div id="imageLoading" style="
display:none;
position:absolute;
inset:0;
z-index:7;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.28);
border-radius:18px;
backdrop-filter:blur(3px);
-webkit-backdrop-filter:blur(3px);
">
  <div style="
  width:64px;
  height:64px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.18);
  border-top:3px solid #ff4fa3;
  animation:spin 0.9s linear infinite;
  box-shadow:0 0 24px rgba(255,79,163,0.35);
  "></div>
</div>

  <div id="imageLock" style="
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:6;
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  background:rgba(0,0,0,0.52);
  border:1.5px solid rgba(255,255,255,0.7);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  color:#fff;
  cursor:pointer;
  ">
    <div style="font-size:34px;line-height:1;">🔒</div>
    <div style="font-size:12px;font-weight:700;line-height:1.2;">Unlock</div>
    <div style="font-size:11px;opacity:0.9;line-height:1;">5 tokens</div>
  </div>

  <img id="aiImage" src="images/locked-preview.png" style="
  width:50%;
  max-width:240px;
  height:auto;
  border-radius:18px;
  display:block;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  filter: blur(20px);
  opacity:1;
  transition:opacity 0.45s ease, filter 0.45s ease;
  ">
</div>

<div class="summary-card">
  <div class="summary-row"><span>Age:</span><strong id="age"></strong></div>
  <div class="summary-row"><span>Ethnicity:</span><strong id="ethnicity"></strong></div>
  <div class="summary-row"><span>Body:</span><strong id="body"></strong></div>
  <div class="summary-row"><span>Body Details:</span><strong id="bodyDetails"></strong></div>
  <div class="summary-row"><span>Hair:</span><strong id="hair"></strong></div>
  <div class="summary-row"><span>Appearance:</span><strong id="appearanceDetails"></strong></div>
  <div class="summary-row"><span>Personality:</span><strong id="personality"></strong></div>
</div>
<button class="btn" onclick="startChat()">Start Chat</button>
<script>
function formatText(text){
  if(!text) return '-';
  return text.replaceAll('-', ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function startChat(){
  window.location.href = 'chat.html';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('age').textContent = formatText(localStorage.getItem('age'));
  document.getElementById('ethnicity').textContent = formatText(localStorage.getItem('ethnicity'));
  document.getElementById('body').textContent = formatText(localStorage.getItem('body'));
  document.getElementById('bodyDetails').textContent = formatText(localStorage.getItem('bodyDetails'));
  document.getElementById('hair').textContent = formatText(localStorage.getItem('hair'));
  document.getElementById('appearanceDetails').textContent = formatText(localStorage.getItem('appearanceDetails'));
  document.getElementById('personality').textContent = formatText(localStorage.getItem('personality'));
});

const profile = {
  age: localStorage.getItem('age'),
  ethnicity: localStorage.getItem('ethnicity'),
  body: localStorage.getItem('body'),
  bodyDetails: localStorage.getItem('bodyDetails'),
  hair: localStorage.getItem('hair'),
  appearanceDetails: localStorage.getItem('appearanceDetails'),
  personality: localStorage.getItem('personality')
};

const img = document.getElementById('aiImage');
const loading = document.getElementById('imageLoading');
const imageLock = document.getElementById('imageLock');
const tokenEl = document.getElementById('tokenBalance');

const savedImage = localStorage.getItem('aiImage');
const imageUnlocked = localStorage.getItem('imageUnlocked') === "true";

loading.style.display = "none";
img.style.display = "block";

fetch('/api/wallet')
  .then(res => res.json())
  .then(data => {
    if (data.balance !== undefined) {
      tokenEl.innerText = "💰 " + data.balance;
    }
  });

if (imageUnlocked && savedImage) {
  img.src = savedImage;
  img.style.filter = "blur(0px)";
  imageLock.style.display = "none";
}

imageLock.addEventListener('click', async () => {

  loading.style.display = "flex";

  const res = await fetch('/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      msg: "generate image"
      name: "Luna",
      profile
    })
  });

  const data = await res.json();

  if (data.imageBase64) {
    img.onload = () => {
      loading.style.display = "none";
      img.style.filter = "blur(0px)";
      imageLock.style.display = "none";
    };

    img.src = "data:image/png;base64," + data.imageBase64;
  } else {
    loading.style.display = "none";
    alert("error");
  }

});
</script>
</body>
</html>
