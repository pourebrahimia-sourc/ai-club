<!DOCTYPE html>
<html>
<head>
  <title>AI Club Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="logo">AI Club</div>
<h2 class="title">Your AI Girlfriend 💖</h2>
<div id="chat" class="chat-box"></div>
<input id="input" class="chat-input" placeholder="Say something...">
<button class="btn" onclick="talk()">Talk</button>
  <button id="voiceBtn" onclick="startVoice()">🎤 Speak</button>
<script>
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    input.value = text;
    talk();
  };

  recognition.start();
}
  function getCharacterProfile(){
  return {
    age: localStorage.getItem('age') || '',
    ethnicity: localStorage.getItem('ethnicity') || '',
    body: localStorage.getItem('body') || '',
    bodyDetails: localStorage.getItem('bodyDetails') || '',
    hair: localStorage.getItem('hair') || '',
    appearanceDetails: localStorage.getItem('appearanceDetails') || '',
    personality: localStorage.getItem('personality') || ''
  };
}

console.log('CHARACTER PROFILE:', getCharacterProfile());
let history = [];
const names = ['Luna','Mia','Nora','Eva','Zara'];
let aiName = localStorage.getItem('aiName');

if(!aiName){
  const names = ['Luna','Mia','Nora','Eva','Zara'];
  aiName = names[Math.floor(Math.random()*names.length)];
  localStorage.setItem('aiName', aiName);
}
const chat = document.getElementById('chat');
const input = document.getElementById('input');
function addMessage(sender, text, color){
  chat.innerHTML += `<p><b style="color:${color};">${sender}:</b> ${text}</p>`;
  chat.scrollTop = chat.scrollHeight;
}
async function talk(){
  const msg = input.value.trim();
  if(!msg) return;
  addMessage('You', msg, '#66b3ff');
  input.value = '';
  try{
    const res = await fetch('/api',{
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ 
  msg, 
  history, 
  name: aiName,
  profile: getCharacterProfile()
})
    });
    const data = await res.json();
    const reply = data.reply || data.error || 'Error';
    addMessage(aiName, reply, '#ff4fa3');
    history.push({ role:'user', parts:[{text:msg}] });
    history.push({ role:'model', parts:[{text:reply}] });
  }catch(e){
    addMessage(aiName, 'Error', '#ff4fa3');
  }
}
input.addEventListener('keydown', function(e){ if(e.key === 'Enter') talk(); });
  function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    input.value = text;
  };

  recognition.start();
}
</script>
</body>
</html>
