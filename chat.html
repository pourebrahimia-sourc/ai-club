<!DOCTYPE html>
<html>
<head>
  <title>AI Club Chat</title>
 <style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  box-sizing:border-box;
  color:#fff;
}

/* background */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.bg video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(40px);
  transform: scale(1.2);
}

/* desktop */
@media (min-width:768px){
  body{
    background:#111;
    align-items:center;
  }

  .bg video{
    width:420px;
    height:720px;
    border-radius:24px;
  }
}

/* top */
.logo{
  text-align:center;
  margin-bottom:6px;
}

.title{
  text-align:center;
  margin-bottom:10px;
}

/* chat */
#chat{
  height:50vh;
  overflow:auto;
  padding:12px;
  border-radius:12px;
  backdrop-filter: blur(6px);
}

/* input */
#input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:#fff;
  margin-top:10px;
}

/* buttons */
.action-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(255,79,163,0.6);
  color:#fff;
  cursor:pointer;
  backdrop-filter: blur(10px);
}

.talk-btn{
  flex:1;
}

.voice-btn{
  width:60px;
}

/* z-index fix */
#chat, #input, .btn, .logo, .title{
  position:relative;
  z-index:2;
}
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
</head>
<body>
<div class="bg">
  <video autoplay muted loop playsinline preload="auto">
    <source src="images/character.mp4" type="video/mp4">
  </video>
</div>
<div class="logo">AI Club</div>
<h2 class="title">Your AI Girlfriend 💖</h2>
<div id="chat" class="chat-box"></div>
<input id="input" class="chat-input" placeholder="Say something...">
<div class="action-row">
  <button class="btn talk-btn" onclick="talk()">Talk</button>
  <button id="voiceBtn" class="btn voice-btn" onclick="startVoice()">🎤</button>
</div>

<script>
let history = [];
let lastInputWasVoice = false;

const names = ['Luna','Mia','Nora','Eva','Zara'];
let aiName = localStorage.getItem('aiName');

if(!aiName){
  aiName = names[Math.floor(Math.random() * names.length)];
  localStorage.setItem('aiName', aiName);
}

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const voiceBtn = document.getElementById('voiceBtn');

speechSynthesis.getVoices();

function getCharacterProfile(){
  return {
    age: localStorage.getItem('age') || '',
    ethnicity: localStorage.getItem('ethnicity') || '',
    body: localStorage.getItem('body') || '',
    bodyDetails: localStorage.getItem('bodyDetails') || '',
    hair: localStorage.getItem('hair') || '',
    appearanceDetails: localStorage.getItem('appearanceDetails') || '',
    personality: localStorage.getItem('personality') || ''
  };
}

function addMessage(sender, text, color){
  chat.innerHTML += `<p><b style="color:${color};">${sender}:</b> ${text}</p>`;
  chat.scrollTop = chat.scrollHeight;

  if(sender === aiName && lastInputWasVoice){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.pitch = 1.4;
    speech.rate = 0.95;
    speech.volume = 1;
    speech.voice = speechSynthesis.getVoices().find(v => v.name.includes('Female')) || speechSynthesis.getVoices()[0];
    speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
    lastInputWasVoice = false;
  }
}

async function talk(){
  const msg = input.value.trim();
  if(!msg) return;

  addMessage('You', msg, '#66b3ff');
  input.value = '';

  try{
    const res = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        msg,
        history,
        name: aiName,
        profile: getCharacterProfile()
      })
    });

    const data = await res.json();
    const reply = data.reply || data.error || 'Error';

    addMessage(aiName, reply, '#ff4fa3');

    history.push({ role:'user', parts:[{ text: msg }] });
    history.push({ role:'model', parts:[{ text: reply }] });
  }catch(e){
    addMessage(aiName, 'Error', '#ff4fa3');
  }
}

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert('Voice recognition is not supported on this browser');
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;

  voiceBtn.innerText = "Listening...";

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    input.value = text;
    lastInputWasVoice = true;
    talk();
  };

  recognition.onend = function(){
    voiceBtn.innerText = "🎤 Speak";
  };

  recognition.onerror = function(){
    voiceBtn.innerText = "🎤 Speak";
  };

  recognition.start();
}

input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    lastInputWasVoice = false;
    talk();
  }
});
</script>
</body>
</html>
