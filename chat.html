<!DOCTYPE html>
<html>
<head>
  <title>AI Club Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="logo">AI Club</div>
<h2 class="title">Your AI Girlfriend 💖</h2>
<div id="chat" class="chat-box"></div>
<input id="input" class="chat-input" placeholder="Say something...">
<button class="btn" onclick="talk()">Talk</button>
  <button id="voiceBtn" onclick="startVoice()">🎤 Speak</button>
  <button id="voiceModeBtn" class="btn">Voice Mode: OFF</button>
<script>
function startVoice(){
  const input = document.getElementById('input');
  const voiceBtn = document.getElementById('voiceBtn');
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;

  voiceBtn.innerText = "Listening...";

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    input.value = text;
    lastInputWasVoice = true;
    talk();
    voiceBtn.innerText = "🎤 Speak";
    input.value = '';
  };

  recognition.onend = function(){
    voiceBtn.innerText = "🎤 Speak";
  };

  recognition.start();
}

let voiceMode = false;
let lastInputWasVoice = false;
const voiceModeBtn = document.getElementById('voiceModeBtn');

voiceModeBtn.onclick = function(){
  voiceMode = !voiceMode;
  voiceModeBtn.innerText = voiceMode ? "Voice Mode: ON" : "Voice Mode: OFF";
};
function getCharacterProfile(){
  return {
    age: localStorage.getItem('age') || '',
    ethnicity: localStorage.getItem('ethnicity') || '',
    body: localStorage.getItem('body') || '',
    bodyDetails: localStorage.getItem('bodyDetails') || '',
    hair: localStorage.getItem('hair') || '',
    appearanceDetails: localStorage.getItem('appearanceDetails') || '',
    personality: localStorage.getItem('personality') || ''
  };
}

console.log('CHARACTER PROFILE:', getCharacterProfile());
let history = [];
const names = ['Luna','Mia','Nora','Eva','Zara'];
let aiName = localStorage.getItem('aiName');

if(!aiName){
  const names = ['Luna','Mia','Nora','Eva','Zara'];
  aiName = names[Math.floor(Math.random()*names.length)];
  localStorage.setItem('aiName', aiName);
}
const chat = document.getElementById('chat');
const input = document.getElementById('input');
    speechSynthesis.getVoices();
function addMessage(sender, text, color){
  chat.innerHTML += `<p><b style="color:${color};">${sender}:</b> ${text}</p>`;
  chat.scrollTop = chat.scrollHeight;

  if(sender === aiName && voiceMode && window._lastWasVoice){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.pitch = 1.4;
    speech.rate = 0.95;
    speech.volume = 1;
    speech.voice = speechSynthesis.getVoices().find(v => v.name.includes('Female')) || speechSynthesis.getVoices()[0];
    speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
  }
}
async function talk(){
  const isVoice = lastInputWasVoice;
lastInputWasVoice = false;
  window._lastWasVoice = isVoice;
  const msg = input.value.trim();
  if(!msg) return;
  addMessage('You', msg, '#66b3ff');
  input.value = '';
  try{
    const res = await fetch('/api',{
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ 
  msg, 
  history, 
  name: aiName,
  profile: getCharacterProfile()
})
    });
    const data = await res.json();
    const reply = data.reply || data.error || 'Error';
    addMessage(aiName, reply, '#ff4fa3');
    history.push({ role:'user', parts:[{text:msg}] });
    history.push({ role:'model', parts:[{text:reply}] });
  }catch(e){
    addMessage(aiName, 'Error', '#ff4fa3');
  }
}
input.addEventListener('keydown', function(e){ if(e.key === 'Enter') talk(); });

</script>
</body>
</html>
