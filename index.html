<!DOCTYPE html>
<html>
<head>
  <title>Create AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      padding:14px;
    }

    .top-btn{
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      color:#fff;
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }

    .container{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
      text-align:center;
    }

    .title{
      font-size:26px;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:14px;
      opacity:0.7;
      margin-bottom:20px;
    }

    .image{
      width:100%;
      max-width:320px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .cta{
      width:100%;
      max-width:320px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#ff4fa3;
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .hook{
      margin-top:10px;
      font-size:13px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <button class="top-btn" onclick="goProfile()">👤 Profile</button>
  <div style="display:flex; gap:6px;">
    <button class="top-btn" onclick="goGift()">🎁</button>
    <button class="top-btn" onclick="goSubscribe()">💎</button>
  </div>
</div>

<div class="container">

  <div class="title">Create your AI Girlfriend ✨</div>
  <div class="subtitle">Build your perfect companion</div>

  <img src="images/main.jpg" class="image">

  <button class="cta" onclick="start()">Create 💖</button>
  <div class="hook">She’s waiting for you…</div>

</div>

<script>
let isLoggedIn = false;

// ✅ چک واقعی سشن
async function checkSession(){
  try{
    const token = localStorage.getItem('accessToken');
    if(!token) return;

    const res = await fetch('/api/session', {
      headers: {
        Authorization: 'Bearer ' + token
      }
    });

    const data = await res.json();
    if(data?.data?.session){
      isLoggedIn = true;
    }
  }catch(e){}
}

// CTA
function start(){
  window.location.href = "age.html";
}

// Buttons
function goProfile(){
  window.location.href = isLoggedIn ? 'profile.html' : 'login.html';
}

function goGift(){
  window.location.href = isLoggedIn ? 'gift.html' : 'login.html';
}

function goSubscribe(){
  window.location.href = isLoggedIn ? 'subscribe.html' : 'login.html';
}

// init
checkSession();
</script>

</body>
</html>
