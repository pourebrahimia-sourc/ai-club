<!DOCTYPE html>
<html>
<head>
  <title>AI Club</title>
</head>
<body>
  <h1>AI Girlfriend MVP 🚀</h1>
  <input id="input" placeholder="Say something..." />
  <button onclick="talk()">Talk</button>
  <br><br>
  <div id="chat"></div>

  <script>
    let messages = [];
    async function talk() {
      const msg = document.getElementById('input').value;
      messages.push("User: " + msg);
      const res = await fetch('/api?msg=' + encodeURIComponent(msg));
      const data = await res.json();
      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;
      chat.innerHTML += `<p><b>AI:</b> ${data.candidates[0].content.parts[0].text}</p>`;
    }
  </script>
</body>
</html>
