<!DOCTYPE html>
<html>
<head>
  <title>AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="background:#111;color:#fff;font-family:sans-serif;max-width:700px;margin:40px auto;">

<h2 style="margin-bottom:20px;">AI Girlfriend 💖</h2>

<div id="chat" style="background:#1a1a1a;padding:15px;border-radius:10px;height:300px;overflow:auto;"></div>

<br>

<input
  id="input"
  placeholder="Say something..."
  style="width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;box-sizing:border-box;"
>

<br><br>

<button
  onclick="talk()"
  style="padding:10px 18px;border-radius:8px;border:none;background:#ff4fa3;color:#fff;cursor:pointer;"
>
  Talk
</button>

<script>
let history = [];
const names = ["Luna","Mia","Nora","Eva","Zara"];
let aiName = names[Math.floor(Math.random()*names.length)];

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(sender, text, color){
  chat.innerHTML += `<p><b style="color:${color};">${sender}:</b> ${text}</p>`;
  chat.scrollTop = chat.scrollHeight;
}

async function talk(){
  const msg = input.value.trim();
  if(!msg) return;

  addMessage("You", msg, "#66b3ff");
  input.value = "";

  try{
    const res = await fetch("/api",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        msg,
        history,
        name: aiName
      })
    });

    const data = await res.json();

    if(data.error){
      addMessage(aiName, data.error, "#ff4fa3");
      return;
    }

    const reply = data.reply || "Error";
    addMessage(aiName, reply, "#ff4fa3");

    history.push({ role:"user", parts:[{text:msg}] });
    history.push({ role:"model", parts:[{text:reply}] });

  }catch(e){
    addMessage(aiName, "Error", "#ff4fa3");
  }
}

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    talk();
  }
});
</script>

</body>
</html>
