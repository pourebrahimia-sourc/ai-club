<!DOCTYPE html>
<html>
<head>
  <title>Create AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:sans-serif;
      overflow:hidden;
    }

    .container{
      width:100%;
      height:100svh;
      position:relative;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:20px;
      background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 40%);
    }

    .header{
      position:absolute;
      top:16px;
      left:16px;
      right:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:5;
    }

    .logo{font-weight:700;font-size:18px}

    .right{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn-small{
      padding:6px 10px;
      border-radius:10px;
      border:none;
      background:#ff4fa3;
      color:#fff;
      font-size:12px;
      cursor:pointer;
    }

    .token{
      background:#1a1a1a;
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
    }

    .icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#2a2a2a;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .title{
      font-size:26px;
      margin-bottom:6px;
      text-shadow:0 4px 20px rgba(0,0,0,0.6);
    }

    .sub{
      font-size:14px;
      opacity:0.9;
      margin-bottom:20px;
    }

    .cta{
      padding:14px;
      border:none;
      border-radius:14px;
      background:#ff4fa3;
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .loader{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.3);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .spinner{
      width:50px;height:50px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,0.2);
      border-top:3px solid #ff4fa3;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin{
      from{transform:rotate(0)}
      to{transform:rotate(360deg)}
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">AI Club</div>

    <div class="right">
      <button class="btn-small" onclick="goSubscribe()">Subscribe</button>
      <div id="balance" class="token">💰 ...</div>
      <div class="icon" onclick="goGift()">🎁</div>
      <div class="icon" onclick="goProfile()">👤</div>
    </div>
  </div>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline poster="fallback.jpg" id="bgVideo">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- CONTENT -->
  <div class="overlay">
    <div class="title">Create your AI Girlfriend ✨</div>
    <div class="sub">Build your perfect AI companion</div>
    <button class="cta" onclick="start()">Create 💖</button>
  </div>

</div>

<div id="loader" class="loader">
  <div class="spinner"></div>
</div>

<script>

let navigating = false;

function getToken(){
  return localStorage.getItem('accessToken') || '';
}

function showLoader(){
  document.getElementById('loader').style.display = 'flex';
}

function go(url){
  if(navigating) return;
  navigating = true;

  showLoader();
  document.body.style.opacity = '0.5';

  setTimeout(()=>{
    location.href = url;
  },150);
}

function start(){
  localStorage.setItem('funnelFrom','index');
  go('age.html');
}

function goProfile(){
  localStorage.setItem('funnelFrom','index');

  if(getToken()){
    go('profile.html');
  }else{
    localStorage.setItem('loginReturnTo','index.html');
    go('login.html');
  }
}

function goGift(){
  localStorage.setItem('funnelFrom','index');

  if(getToken()){
    go('gift.html');
  }else{
    localStorage.setItem('loginReturnTo','index.html');
    go('login.html');
  }
}

function goSubscribe(){
  localStorage.setItem('funnelFrom','index');

  if(getToken()){
    go('subscribe.html');
  }else{
    localStorage.setItem('loginReturnTo','index.html');
    go('login.html');
  }
}

// 🔥 FAST BALANCE LOAD
async function loadBalance(){
  const el = document.getElementById('balance');
  const token = getToken();

  if(!token){
    el.innerText='💰 0';
    return;
  }

  const cached = localStorage.getItem('cachedBalance');
  if(cached) el.innerText='💰 '+cached;

  try{
    const r = await fetch('/api/wallet',{
      headers:{Authorization:'Bearer '+token}
    });
    const d = await r.json();

    el.innerText='💰 '+d.balance;
    localStorage.setItem('cachedBalance', d.balance);

  }catch{
    el.innerText='💰 '+(cached || 0);
  }
}

// 🔥 SESSION FIX (NO DELAY)
function syncSession(){
  const hash = new URLSearchParams(location.hash.slice(1));
  const access = hash.get('access_token');

  if(!access) return;

  localStorage.setItem('accessToken', access);
  localStorage.setItem('refreshToken', hash.get('refresh_token') || '');

  history.replaceState({},'',location.pathname);
}

// 🚀 INIT
syncSession();
loadBalance();

</script>

</body>
</html>
