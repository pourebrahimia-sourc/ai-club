<!DOCTYPE html>
<html>
<head>
  <title>Create AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:sans-serif;
    }

    .create-container{
      max-width:380px;
      margin:40px auto;
      padding:0 16px;
      text-align:center;
    }

    .create-title{
      margin:0 0 10px 0;
      font-size:28px;
    }

    .create-subtitle{
      margin:0 0 16px 0;
      color:rgba(255,255,255,0.7);
      font-size:15px;
    }

    .video-wrapper{
      position:relative;
      width:100%;
      margin:0 0 16px 0;
    }

    .create-video{
      width:100%;
      display:block;
      border-radius:16px;
    }

    .desktop-btn{
      width:100%;
      padding:14px 20px;
      border-radius:14px;
      border:none;
      background:#ff4fa3;
      color:#fff;
      font-size:16px;
      cursor:pointer;
    }

    .overlay-top,
    .overlay-btn{
      display:none;
    }

    @media (max-width: 640px){
      body{
        overflow:hidden;
      }

      .create-container{
        max-width:none;
        width:100%;
        height:100svh;
        margin:0;
        padding:0;
        position:relative;
      }

      .create-title,
      .create-subtitle,
      .desktop-btn{
        display:none;
      }

      .video-wrapper{
        width:100%;
        height:100svh;
        margin:0;
      }

      .create-video{
        width:100%;
        height:100%;
        object-fit:cover;
        border-radius:0;
      }

      .overlay-top{
        display:block;
        position:absolute;
        left:16px;
        right:16px;
        bottom:92px;
        text-align:center;
        z-index:3;
      }

      .overlay-top h2{
        margin:0 0 8px 0;
        font-size:24px;
        line-height:1.25;
        color:#fff;
        text-shadow:0 3px 14px rgba(0,0,0,0.45);
      }

      .overlay-top p{
        margin:0;
        font-size:14px;
        line-height:1.4;
        color:rgba(255,255,255,0.9);
        text-shadow:0 3px 14px rgba(0,0,0,0.45);
      }

      .overlay-btn{
        display:block;
        position:absolute;
        left:16px;
        right:16px;
        bottom:20px;
        width:auto;
        padding:14px 20px;
        border-radius:14px;
        border:none;
        background:#ff4fa3;
        color:#fff;
        font-size:16px;
        cursor:pointer;
        z-index:3;
        margin:0;
      }
    }
  </style>
</head>

<body>

<div class="create-container">

  <h2 class="create-title">Create your AI Girlfriend ✨</h2>
  <p class="create-subtitle">Build your perfect AI companion</p>

  <div class="video-wrapper">
    <video autoplay muted loop playsinline class="create-video">
      <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay-top">
      <h2>Create your AI Girlfriend ✨</h2>
      <p>Build your perfect AI companion</p>
    </div>

    <button class="overlay-btn" onclick="start()">
      Create 💖
    </button>
  </div>

  <button class="desktop-btn" onclick="start()">
    Create 💖
  </button>

</div>

<script>
function start(){
  window.location.href = "age.html";
}
</script>

</body>
</html>
